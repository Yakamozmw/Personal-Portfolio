<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hi+Melody&family=Jaldi:wght@400;700&family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Personal Portfolio</title>
</head>
<body>
    <header>
        <nav>
            <a href="about.html">About</a>
            <a href="index.html#indexPortfolio">Portfolio</a>
            <a href="resume.html">Resume</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <main id="contactMain">
        <h1>Contact <span class="titleEmphasis">Me</span></h1>
        <h2>Contact me using this form or my Socials below!</h2>
        <form id="contactForm" class="greenContainer">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your name">
            <label for="Email">E-mail:</label>
            <input type="email" id="Email" name="E-mail" placeholder="Enter your E-mail">
            <label for="message">Message:</label>
            <textarea id="message" name="message" placeholder="Type the message you'd like to send..."></textarea>
            <button type="submit">Submit</button>
        </form>
        <section id="socialLinks">
            <div class="socialLink">
                <img src="images/linkedin.png" alt="LinkedIn Logo">
                <a href="https://www.linkedin.com/in/joshuafollente/">https://www.linkedin.com/in/joshuafollente/</a>
            </div>
            <div class="socialLink">
                <img src="images/github.png" alt="GitHub Logo">
                <a href="https://github.com/Yakamozmw">https://github.com/Yakamozmw</a>
            </div>
            <div class="socialLink">
                <img src="images/gmail.png" alt="Gmail Logo">
                <p>joshuafollente@gmail.com</p>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
